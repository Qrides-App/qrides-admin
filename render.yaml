services:
  - type: web
    name: qrides-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    disk:
      name: branding-storage
      mountPath: /var/www/html/storage/firebase
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: qrides-mysql
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: qrides-mysql
          property: port
      - key: DB_DATABASE
        fromService:
          type: pserv
          name: qrides-mysql
          envVarKey: MYSQL_DATABASE
      - key: DB_USERNAME
        fromService:
          type: pserv
          name: qrides-mysql
          envVarKey: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: qrides-mysql
          envVarKey: MYSQL_PASSWORD
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_DRIVER
        value: array
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: SESSION_SAME_SITE
        value: lax
      - key: LOG_CHANNEL
        value: stderr
      - key: SANCTUM_ISSUE_SECRET
        value: 49382716504938271650493827165049
      - key: ALLOW_GUEST_TOKENS
        value: true
      - key: GOOGLE_MAP_KEY
        sync: false
      - key: FIREBASE_SERVER_KEY
        sync: false
      - key: SUPER_ADMIN_NAME
        value: Super Admin
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false

  - type: pserv
    name: qrides-mysql
    runtime: docker
    plan: starter
    dockerfilePath: ./docker/mysql/Dockerfile
    autoDeploy: false
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 20
    envVars:
      - key: MYSQL_DATABASE
        value: qridesdb
      - key: MYSQL_USER
        value: qridesuser
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
